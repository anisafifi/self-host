name: noco_db

services:
  nocodb:
    depends_on:
      root_db:
        condition: service_healthy
    environment:
      NC_DB: "pg://${NC_DB_HOST}:${NC_DB_PORT}?u=${NC_DB_USER}&p=${NC_DB_PASSWORD}&d=${NC_DB_NAME}"
    image: "nocodb/nocodb:latest"
    restart: always
    volumes:
      - "nc_data:/usr/app/data"
    networks:
      - proxy-net

  root_db:
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    healthcheck:
      interval: 10s
      retries: 10
      test: 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"'
      timeout: 2s
    image: postgres:16.6
    restart: always
    volumes:
      - "db_data:/var/lib/postgresql/data"
    networks:
      - proxy-net

volumes:
  db_data: {}
  nc_data: {}

networks:
  proxy-net:
    external: true
