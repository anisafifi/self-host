name: infisical

services:
  infisical:
    container_name: infisical-backend
    restart: unless-stopped
    depends_on:
      infisical-db:
        condition: service_healthy
      infisical-redis:
        condition: service_started
    image: infisical/infisical:latest-postgres
    pull_policy: always
    env_file: .env
    # ports:
    #   - 8029:8080
    environment:
      - NODE_ENV=production 

  infisical-redis:
    image: redis
    container_name: infisical-dev-redis
    env_file: .env
    restart: always
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    volumes:
      - redis_data:/data

  infisical-db:
    container_name: infisical-db
    image: postgres:14-alpine
    restart: always
    env_file: .env
    volumes:
      - ./docker_data/infisical:/var/lib/postgresql/data

    healthcheck:
      test: "pg_isready --username=${POSTGRES_USER} --dbname=${POSTGRES_DB} && psql --username=${POSTGRES_USER} --dbname=${POSTGRES_DB} --list"
      interval: 5s
      timeout: 10s
      retries: 10

volumes:
  redis_data:
    driver: local

networks:
  proxy-net:
    external: true